name: prewed_studio
description: PreWed Studio - All Your Pre-Wedding Needs, One Place
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Image
  image_picker: ^1.0.7
  photo_view: ^0.14.0

  # Payment
  razorpay_flutter: ^1.3.6

  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2
  flutter_spinkit: ^5.2.0
  lottie: ^3.0.0
  fluttertoast: ^8.2.4
  pinput: ^3.0.1
  timeline_tile: ^2.0.0
  percent_indicator: ^4.2.3
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0
  badges: ^3.1.2
  expandable: ^5.0.1
  dotted_border: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#C5414C"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
